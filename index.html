<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Travel Builder | QuickUtils</title>
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Travel Builder",
    "url": "https://travelbuilder.quickutils.top/",
    "description": "Plan your perfect trip with day-by-day itineraries, budget tracking, and packing checklists.",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
    }
}
</script>
    <link rel="canonical" href="https://travelbuilder.quickutils.top/">
    <meta name="keywords" content="QuickUtils, travel, builder, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Travel Builder | QuickUtils">
    <meta property="og:description" content="Plan your perfect trip with day-by-day itineraries, budget tracking, and packing checklists.">
    <meta property="og:url" content="https://quickutils.top/travel-builder/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Plan your perfect trip with day-by-day itineraries, budget tracking, and packing checklists.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ffffff">
</head>
<body class="grid-bg">
    <nav class="navbar glass-nav"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand holo-text">✈️ Travel Builder</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">Travel Builder</h1><p class="text-muted">Plan your perfect trip</p></div>
    <div class="d-flex gap-4" style="flex-wrap:wrap;">
        <div class="glass-card p-4" style="flex:1;min-width:300px;">
            <h3>🗓️ Itinerary</h3>
            <input type="text" id="tripName" class="form-control mb-2" placeholder="Trip name...">
            <div class="d-flex gap-2 mb-3"><input type="text" id="actInput" class="form-control" placeholder="Add activity..."><button class="btn btn-primary" id="addAct">+</button></div>
            <div id="itinerary"></div>
        </div>
        <div class="glass-card p-4" style="flex:1;min-width:300px;">
            <h3>💰 Budget</h3>
            <div class="d-flex gap-2 mb-3"><input type="text" id="expName" class="form-control" placeholder="Expense"><input type="number" id="expAmt" class="form-control" style="max-width:100px;" placeholder="$"><button class="btn btn-secondary" id="addExp">+</button></div>
            <div id="expenses"></div>
            <div class="mt-3" style="font-size:1.3rem;font-weight:700;">Total: $<span id="totalBudget">0</span></div>
        </div>
    </div>
    <div class="glass-card p-4 mt-4"><h3>🎒 Packing List</h3><div class="d-flex gap-2 mb-3"><input type="text" id="packItem" class="form-control" placeholder="Item to pack..."><button class="btn btn-secondary" id="addPack">+</button></div><div id="packList"></div></div>
    </main>
    <footer class="footer"><div class="container copyright text-center py-4">© 2026 QuickUtils. All rights reserved.</div></footer>
    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
